configuration:
  nif:
    name: NIF
    description: "Your Portuguese tax identification number (NIF) for E-REDES login."
  password:
    name: Password
    description: "Your E-REDES Balcão Digital account password."
  meters:
    name: Meter CPE numbers
    description: "List of CPE numbers to scrape (e.g. PT0002000012345678XX)."
  schedule_times:
    name: Schedule times
    description: "Comma-separated times to run the scraper each day (24h format, e.g. 07:00,12:00)."
  mqtt_host:
    name: MQTT Host
    description: "Hostname of the MQTT broker. Use 'core-mosquitto' for the built-in Mosquitto add-on."
  mqtt_port:
    name: MQTT Port
    description: "Port of the MQTT broker (default 1883)."
  mqtt_username:
    name: MQTT Username
    description: "MQTT username (leave blank if not required)."
  mqtt_password:
    name: MQTT Password
    description: "MQTT password (leave blank if not required)."
  run_on_startup:
    name: Run on startup
    description: "If enabled, performs a scrape immediately when the add-on starts."
