# https://developers.home-assistant.io/docs/add-ons/configuration
name: "E-REDES Balcão Digital Meter"
version: "1.1.0"
slug: "eredes_meter"
description: "Scrapes energy meter readings (vazio, ponta, cheias) from E-REDES Balcão Digital and publishes them via MQTT."
url: "https://github.com/Greg-null/ha_addon_eredes_balcao_digital_meter"

arch:
  - aarch64
  - amd64

init: false
startup: "services"
boot: "auto"
host_network: false

map:
  - type: data

options:
  nif: ""
  password: ""
  meters:
    - "PT0002000..."
  schedule_times: "07:00,12:00"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  run_on_startup: true

schema:
  nif: "str"
  password: "password"
  meters:
    - "str"
  schedule_times: "str"
  mqtt_host: "str"
  mqtt_port: "int"
  mqtt_username: "str?"
  mqtt_password: "password?"
  run_on_startup: "bool"
